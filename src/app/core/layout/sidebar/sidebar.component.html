<div class="sidebar" [ngClass]="{ expanded: isExpanded }">
  
  <div class="header" [class.clickable]="!isExpanded" (click)="!isExpanded && handleSidebarToggle()">
    <div class="icon">
      <img src="https://sistemas.amepla.org.ar/cdn/img/icono.png" alt="Icono AMEPLA" class="ms-1"/>
    </div>
    <h1 class="title">AMP</h1>
    <button class="toggle-btn" (click)="isExpanded && handleSidebarToggle(); $event.stopPropagation()" type="button" *ngIf="isExpanded">
      <i class="bi bi-chevron-left"></i>
    </button>
  </div>
  <div class="content">
    <app-sidebar-nav [navItems]="navItems"></app-sidebar-nav>
  </div>
  <div class="footer"></div>
</div>
