<div class="container py-4">
  <div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
      <h5 class="mb-0">
        {{ opciones.titulo }}
        <div class="spinner-border spinner-border-sm ms-2" role="status" *ngIf="loading || cargando">
          <span class="visually-hidden">Cargando...</span>
        </div>
      </h5>
    </div>
    
    <div class="card-body">
      <!-- Mensaje de error -->
      <div *ngIf="error" class="alert alert-danger mb-3">
        {{ error }}
      </div>
      
      <!-- Buscador -->
      <div class="search-container mb-4">
        <form [formGroup]="form">
          <div class="input-group">
            <span class="input-group-text bg-light">
              <i class="bi bi-search"></i>
            </span>
            <input 
              type="text" 
              class="form-control" 
              placeholder="{{ opciones.placeholder }}" 
              formControlName="filtrar"
              (keyup)="Filtrar()"
            >
            <button 
              class="btn btn-primary" 
              type="button"
              (click)="Insertar()" 
              title="Crear nuevo elemento"
            >
              <i class="bi bi-plus"></i> Crear
            </button>
          </div>
        </form>
      </div>

      <!-- Tabla -->
      <div class="table-responsive">
        <table class="table table-hover" *ngIf="datos != null">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th *ngFor="let columna of columnasExtras">{{ columna.titulo }}</th>
              <th>Estado</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <!-- Estado de carga -->
            <tr *ngIf="(loading || cargando) && informacion?.length === 0">
              <td colspan="4" class="text-center py-4">
                <div class="spinner-border text-primary" role="status">
                  <span class="visually-hidden">Cargando...</span>
                </div>
              </td>
            </tr>

            <!-- Estado vacío -->
            <tr *ngIf="!(loading || cargando) && informacion?.length === 0 && !error">
              <td colspan="4" class="text-center py-4">
                <div class="empty-state">
                  <i class="fas fa-inbox fa-3x text-muted mb-3"></i>
                  <h5 class="text-muted">No hay registros</h5>
                  <p class="text-muted">Utilice el buscador o el botón "Nuevo" para agregar</p>
                </div>
              </td>
            </tr>

            <!-- Datos -->
            <tr *ngFor="let item of informacion; let i = index">
              <td [ngClass]="{ 'text-bg-danger': item.activo }">
                {{ item.id }}
              </td>
              <td [ngClass]="{ 'text-bg-danger': item.activo }">
                {{ item.nombre }}
              </td>
              <td *ngFor="let columna of columnasExtras" [ngClass]="{ 'text-bg-danger': item.activo }">
                {{ obtenerValorColumna(item, columna) }}
              </td>
              <td [ngClass]="{ 'text-bg-danger': item.activo }">
                <span class="badge" [ngClass]="item.activo ? 'bg-danger' : 'bg-success'">
                  {{ item.activo ? "DESHABILITADO" : "HABILITADO" }}
                </span>
              </td>
              <td style="width: 150px;">
                <div class="d-flex justify-content-center">
                  <button
                    class="btn btn-sm btn-outline-primary me-2"
                    type="button"
                    title="EDITAR"
                    (click)="Editar(item)"
                  >
                    <i class="bi bi-pencil-square"></i>
                  </button>
                  <button
                    class="btn btn-sm btn-outline-info me-2"
                    type="button"
                    title="VISUALIZAR"
                    *ngIf="mostrarVisualizarLegacy"
                    (click)="Visualizar(item.id)"
                  >
                    <i class="bi bi-eye"></i>
                  </button>
                  <button
                    *ngFor="let boton of botonesAccion"
                    class="btn btn-sm me-2"
                    [ngClass]="boton.clase || 'btn-outline-secondary'"
                    type="button"
                    [title]="boton.titulo"
                    (click)="EjecutarAccion(boton.nombre, item)"
                  >
                    <i [class]="boton.icono"></i>
                  </button>
                  <div style="width: 32px;">
                    <button
                      class="btn btn-sm btn-outline-danger me-2"
                      type="button"
                      title="DESACTIVAR"
                      *ngIf="!item.activo"
                      (click)="ActualizarEstado(item)"
                    >
                      <i class="bi bi-eye-slash"></i>
                    </button>
                    <button
                      class="btn btn-sm btn-outline-success"
                      type="button"
                      title="ACTIVAR"
                      *ngIf="item.activo"
                      (click)="ActualizarEstado(item)"
                    >
                      <i class="bi bi-eye"></i>
                    </button>
                  </div>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Paginación -->
      <div class="d-flex justify-content-between align-items-center mt-3" *ngIf="datos != null && informacion?.length > 0">
        <div class="d-flex align-items-center">
          <label class="me-2">Mostrar:</label>
          <select
            class="form-select form-select-sm"
            style="width: auto"
            [(ngModel)]="pageSize"
            (ngModelChange)="refreshTable()"
          >
            <option [ngValue]="5">5</option>
            <option [ngValue]="10">10</option>
            <option [ngValue]="15">15</option>
          </select>
        </div>
        
        <ngb-pagination
          [collectionSize]="collectionSize"
          [(page)]="page"
          [pageSize]="pageSize"
          [maxSize]="5"
          [rotate]="true"
          [boundaryLinks]="true"
          (pageChange)="refreshTable()"
          class="mb-0"
        >
        </ngb-pagination>

        <button
          type="button"
          class="btn btn-sm btn-outline-secondary"
          (click)="BorrarFiltro()"
          title="Limpiar búsqueda"
        >
          <i class="bi bi-arrow-clockwise"></i> Limpiar
        </button>
      </div>
    </div>
  </div>
</div>
<app-toast></app-toast>
<app-loading [loading]="loading || isLoading"></app-loading>
