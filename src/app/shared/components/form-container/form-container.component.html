<app-back-button [ruta]="backRoute"></app-back-button>

<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">
            {{ getTitle() }}
            <div class="spinner-border spinner-border-sm ms-2" role="status" *ngIf="cargando">
              <span class="visually-hidden">Cargando...</span>
            </div>
          </h5>
        </div>
        
        <div class="card-body">
          <ng-content></ng-content>
          
          <!-- BOTONES DE ACCIÓN -->
          <div class="d-flex justify-content-end gap-2 mt-4" *ngIf="!ocultarBoton">
            <button 
              type="button" 
              class="btn btn-primary"
              [disabled]="form?.invalid"
              (click)="onConfirm()"
            >
              <i class="bi bi-floppy me-1"></i>
              {{ getSubmitText() }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<app-loading [loading]="cargando"></app-loading>
