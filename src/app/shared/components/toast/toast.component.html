<ng-container *ngIf="service.toasts.length > 0">
  <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1050">
    <div 
      *ngFor="let toast of service.toasts" 
      class="toast show align-items-center text-white border-0 mb-2" 
      role="alert" 
      aria-live="assertive" 
      aria-atomic="true"
      [ngClass]="toast.classname"
    >
      <div class="d-flex">
        <div class="toast-body">
          {{ toast.textOrTpl }}
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" (click)="service.remove(toast)"></button>
      </div>
    </div>
  </div>
</ng-container>
