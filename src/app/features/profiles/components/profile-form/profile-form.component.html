<div class="container-fluid">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">{{ idProfile ? 'Editar Perfil' : 'Nuevo Perfil' }}</h4>
        </div>
        <div class="card-body">
          <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label for="nombrePerfil" class="form-label">Nombre <span class="text-danger">*</span></label>
              <input 
                type="text" 
                class="form-control" 
                id="nombrePerfil" 
                formControlName="nombrePerfil"
                [class.is-invalid]="profileForm.get('nombrePerfil')?.invalid && profileForm.get('nombrePerfil')?.touched"
              >
              <div class="invalid-feedback" *ngIf="profileForm.get('nombrePerfil')?.invalid && profileForm.get('nombrePerfil')?.touched">
                El nombre es requerido
              </div>
            </div>

            <div class="mb-3">
              <label for="descripcion" class="form-label">Descripción</label>
              <textarea 
                class="form-control" 
                id="descripcion" 
                formControlName="descripcion"
                rows="3"
              ></textarea>
            </div>

            <div class="mb-3 form-check">
              <input 
                type="checkbox" 
                class="form-check-input" 
                id="activo" 
                formControlName="activo"
              >
              <label class="form-check-label" for="activo">
                Activo
              </label>
            </div>

            <div *ngIf="error" class="alert alert-danger" role="alert">
              {{ error }}
            </div>

            <div class="d-flex justify-content-end gap-2">
              <button type="button" class="btn btn-secondary" (click)="onCancel()" [disabled]="loading">
                Cancelar
              </button>
              <button type="submit" class="btn btn-primary" [disabled]="loading || profileForm.invalid">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status"></span>
                {{ idProfile ? 'Actualizar' : 'Crear' }}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
